<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
        }

        .container {
            max-width: 600px;
            background: white;
            margin: 80px auto;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #4facfe;
        }

        h1 { color: #333; }
        h3 { color: #666; }

        p {
            color: #555;
            line-height: 1.6;
        }

        .skills span {
            background: #4facfe;
            color: white;
            padding: 5px 12px;
            margin: 4px;
            border-radius: 15px;
            display: inline-block;
            font-size: 14px;
        }

        .footer {
            font-size: 12px;
            color: gray;
            margin-top: 20px;
        }
    </style>

</head>
<body>

<div class="container">

    <!-- Profile Image -->
    <img src="{{ url_for('static', filename='image1.jpeg') }}">

    <!-- Name -->
    <h1>{{ name }}</h1>

    <!-- Title -->
    <h3>{{ title }}</h3>

    <!-- About -->
    <p>{{ about }}</p>

    <!-- Skills -->
    <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>Python</span>
        <span>Flask</span>
        <span>SQLite</span>
    </div>

    <div class="footer">
        © 2026 Adithya Manuraj
    </div>

</div>

</body>
</html>
